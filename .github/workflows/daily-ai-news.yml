name: Send daily AI news

on:
  schedule:
    # 临时定时测试：01:40 UTC = 北京时间 09:40。
    # 测试成功后请恢复为每天 08:05 / 22:05。
    - cron: "40 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch, summarize and send
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: https://api.deepseek.com
          LLM_MODEL: deepseek-v4-flash
          LLM_CONTENT_CHARS: "8000"
          LLM_MAX_WORKERS: "4"
          TRANSLATION_MODE: auto
          FULL_ARTICLE_BRIEF: "true"
          BRIEF_MAX_CHARS: "2200"
          ARTICLE_CONTENT_MAX_CHARS: "10000"
          TIMEZONE: Asia/Shanghai
          LOOKBACK_HOURS: "36"
          MAX_ARTICLES: "18"
          MAX_PER_SOURCE: "5"
          MARKDOWN_DOWNLOAD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/download.html
        run: python -m ai_daily

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Markdown site
        uses: actions/upload-pages-artifact@v4
        with:
          path: output

  deploy:
    runs-on: ubuntu-latest
    needs: send
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Markdown site
        id: deployment
        uses: actions/deploy-pages@v4
